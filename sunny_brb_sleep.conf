# This presence config defines activity that will display when player is in
# coding "I'll be right back" be right back idle state.
#
# Author: Herman S. <dreamscache.d@gmail.com>
# Since: v0.2.0

[Presence]
Condition = brb_label == "sunny_brb_sleep"
Priority = 1000
Dynamic = True
Inherit = Default


[Activity]
State = Currently Sleeping!
